<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmos3D: Simulador Gravitacional N-Corpos & Octrees</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="hud-panel">
        <h2>SISTEMA DE ORBITAL DE ALTA PRECISÃO</h2>
        <div class="status-indicator">
            <span class="pulse-dot"></span>
            <span id="status-text">MOTOR FÍSICO: ONLINE</span>
        </div>

        <div class="control-group">
            <h3>Configurações Globais</h3>
            
            <div class="slider-container">
                <label for="slide-qty">População Estelar (<span id="val-qty">10</span>)</label>
                <!-- limitar máximo a 20 corpos -->
                <input type="range" id="slide-qty" min="1" max="20" value="10" step="1">
            </div>

            <div class="slider-container">
                <label for="slide-g">Constante Gravitacional G (<span id="val-g">1.0</span>)</label>
                <input type="range" id="slide-g" min="0.1" max="5" value="1" step="0.1">
            </div>

            <div class="checkbox-container">
                <input type="checkbox" id="check-octree" checked>
                <label for="check-octree">Renderizar Malha Octree (Cianógena)</label>
            </div>

            <div class="checkbox-container">
                <input type="checkbox" id="check-simulation" checked>
                <label for="check-simulation">Simulação Ativa</label>
            </div>
        </div>

        <div class="control-group" id="inspector-group">
            <h3>Modificador do Corpo Selecionado</h3>
            <p id="no-selection-msg" class="alert-text">Clique em um corpo no espaço para inspecionar e modificar.</p>
            
            <div id="inspector-controls" class="hidden">
                <div class="slider-container">
                    <label for="slide-body-mass">Massa (<span id="val-body-mass">1.0</span>)</label>
                    <input type="range" id="slide-body-mass" min="0.5" max="10" value="1.0" step="0.5">
                </div>

                <div class="slider-container">
                    <label for="slide-body-size">Tamanho Visual (Raio) (<span id="val-body-size">6</span>)</label>
                    <input type="range" id="slide-body-size" min="2" max="30" value="6" step="0.5">
                </div>

                <div class="slider-container">
                    <label for="slide-body-vx">Velocidade X (<span id="val-body-vx">0.0</span>)</label>
                    <input type="range" id="slide-body-vx" min="-5" max="5" value="0" step="0.1">
                </div>

                <div class="slider-container">
                    <label for="slide-body-vy">Velocidade Y (<span id="val-body-vy">0.0</span>)</label>
                    <input type="range" id="slide-body-vy" min="-5" max="5" value="0" step="0.1">
                </div>

                <div class="slider-container">
                    <label for="slide-body-vz">Velocidade Z (<span id="val-body-vz">0.0</span>)</label>
                    <input type="range" id="slide-body-vz" min="-5" max="5" value="0" step="0.1">
                </div>

                <div class="button-grid">
                    <button id="btn-invert-dir" class="btn-hud">Inverter Direção</button>
                    <button id="btn-repulsion" class="btn-hud toggle-btn">Modo Repulsão</button>
                    <button id="btn-zero-velocity" class="btn-hud">Zerar Velocidade</button>
                </div>
            </div>
        </div>

        <div class="control-group">
            <button id="btn-reset-scene" class="btn-hud btn-danger">Reiniciar Universo</button>
        </div>
    </div>

    <canvas id="cosmosCanvas"></canvas>

    <script src="lib/gl-matrix.js"></script>
    <script>
        // Expor atalhos globais para o código existente que usa window.vec* / window.mat*
        window.glMatrix = window.glMatrix || window.glMatrix;
        window.vec2  = glMatrix.vec2;
        window.vec3  = glMatrix.vec3;
        window.vec4  = glMatrix.vec4;
        window.mat2  = glMatrix.mat2;
        window.mat3  = glMatrix.mat3;
        window.mat4  = glMatrix.mat4;
        window.quat  = glMatrix.quat;
        window.quat2 = glMatrix.quat2;
    </script>
    <script src="js/camera.js"></script>
    <script src="js/octree.js"></script>
    <script src="js/physics.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
